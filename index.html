<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-GOLDEN | وێبسایتی فەرمی</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #D4AF37;
            --dark-bg: #0F1113;
            --card-bg: #1A1D21;
            --text-primary: #FFFFFF;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text-primary); scroll-behavior: smooth; }

        /* --- Header --- */
        .navbar {
            position: fixed; width: 100%; top: 0; z-index: 1000;
            padding: 20px 80px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 17, 19, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .nav-links span { cursor: pointer; margin: 0 15px; transition: 0.3s; }
        .nav-links span:hover { color: var(--accent); }

        /* --- Hero --- */
        .hero {
            height: 50vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), var(--dark-bg)), url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=1200');
            background-size: cover; background-position: center;
        }

        /* --- Cards Grid --- */
        .container { padding: 60px 10%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }

        .premium-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05); transition: var(--transition);
        }

        .premium-card:hover { transform: translateY(-10px); border-color: var(--accent); }

        .img-box { height: 200px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .premium-card:hover .img-box img { transform: scale(1.1); }

        .content { padding: 20px; }
        .btn-gold {
            background: var(--accent); color: #000; padding: 10px 20px;
            border-radius: 10px; text-decoration: none; font-weight: 700;
            display: inline-block; border: none; cursor: pointer; transition: 0.3s;
        }
        .btn-gold:hover { background: #fff; transform: translateY(-2px); }

        /* --- Booking Form --- */
        .booking-section { background: #15181c; padding: 50px; border-radius: 30px; margin-top: 50px; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-field {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 15px; border-radius: 12px; outline: none;
        }
        .input-field:focus { border-color: var(--accent); }

        /* --- Modal (Popup) --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center;
            align-items: center; z-index: 3000;
        }
        .modal-content {
            background: var(--card-bg); padding: 40px; border-radius: 20px;
            max-width: 500px; width: 90%; text-align: center; border: 1px solid var(--accent);
        }
    </style>
</head>
<body>

    <!-- Modal بۆ زانیاری زیاتر -->
    <div class="modal" id="infoModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color: var(--accent);">ناوی ژوور</h2>
            <p id="modalDesc" style="margin: 20px 0; color: #ccc;">لێرەدا زانیاری زیاتر دەربارەی ژوورەکە دەخەینە ڕوو، وەک خزمەتگوزارییەکان و دیمەنەکان.</p>
            <button class="btn-gold" onclick="closeModal()">داخستن</button>
        </div>
    </div>

    <nav class="navbar">
        <div style="font-size: 1.5rem; font-weight: 900; color: var(--accent);">K-GOLDEN</div>
        <div class="nav-links">
            <span onclick="scrollToSection('rooms')">ژوورەکان</span>
            <span onclick="scrollToSection('booking')">حجزکردن</span>
        </div>
    </nav>

    <section class="hero">
        <h1>بەخێربێیت بۆ جیهانی شاهانە</h1>
        <p style="color: var(--accent);">هەرێمی کوردستان - هەولێر - سلێمانی - دهۆک</p>
    </section>

    <main class="container">
        <div class="grid" id="rooms">
            <!-- ژوورەکان بە جاوائێسکریپت لێرە دروست دەبن -->
        </div>

        <section class="booking-section" id="booking">
            <h2 style="text-align: center; margin-bottom: 30px; color: var(--accent);">فۆرمی حجزکردن</h2>
            <form id="bookForm">
                <div class="input-group">
                    <input type="text" id="uName" placeholder="ناوی تەواو" class="input-field" required>
                    <input type="email" id="uEmail" placeholder="ئیمەیڵ" class="input-field" required>
                    <select id="uRoom" class="input-field">
                        <option value="Royal">سویتی پاشایەتی</option>
                        <option value="Modern">ژووری مۆدێرن</option>
                    </select>
                    <input type="date" id="uDate" class="input-field" required>
                </div>
                <button type="submit" class="btn-gold" style="width: 100%; margin-top: 20px;">ناردنی داواکاری</button>
            </form>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyBxIC2nltLHU24g3JaYvaQepRunj4PtPHc",
            authDomain: "kurdistan-hotel-booking.firebaseapp.com",
            projectId: "kurdistan-hotel-booking",
            storageBucket: "kurdistan-hotel-booking.firebasestorage.app",
            messagingSenderId: "83095307994",
            appId: "1:83095307994:web:91b1d16a28f08c039787e3"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Data
        const rooms = [
            { id: 1, title: 'سویتی پاشایەتی', price: 250, img: 'https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=500' },
            { id: 2, title: 'ژووری مۆدێرن', price: 100, img: 'https://images.unsplash.com/photo-1566665797739-1674de7a421a?w=500' },
            { id: 3, title: 'کۆخی شاخاوی', price: 150, img: 'https://images.unsplash.com/photo-1587061949733-5d6932e15720?w=500' }
        ];

        // 1. زیندووکردنی کارتەکان
        const grid = document.getElementById('rooms');
        rooms.forEach(room => {
            const card = document.createElement('div');
            card.className = 'premium-card';
            card.innerHTML = `
                <div class="img-box"><img src="${room.img}"></div>
                <div class="content">
                    <h3>${room.title}</h3>
                    <p style="margin: 10px 0;">نرخ: $${room.price} / شەو</p>
                    <button class="btn-gold" onclick="openModal('${room.title}')">بینینی زانیاری</button>
                </div>
            `;
            grid.appendChild(card);
        });

        // 2. زیندووکردنی فۆرمەکە
        document.getElementById('bookForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button');
            submitBtn.innerText = "خەریکە دەنێردرێت...";
            submitBtn.disabled = true;

            try {
                await addDoc(collection(db, "bookings"), {
                    name: document.getElementById('uName').value,
                    email: document.getElementById('uEmail').value,
                    room: document.getElementById('uRoom').value,
                    date: document.getElementById('uDate').value,
                    time: new Date()
                });
                alert("سوپاس! داواکارییەکەت گەیشتە بەشی حجزکردن.");
                e.target.reset();
            } catch (err) {
                alert("هەڵەیەک ڕوویدا لە کاتی ناردن.");
            } finally {
                submitBtn.innerText = "ناردنی داواکاری";
                submitBtn.disabled = false;
            }
        });

        // 3. فەنکشنە گشتییەکان (بەستنەوە بە Window بۆ ئەوەی کار بکەن)
        window.openModal = (title) => {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('infoModal').style.display = 'flex';
        };
        window.closeModal = () => {
            document.getElementById('infoModal').style.display = 'none';
        };
        window.scrollToSection = (id) => {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        };
    </script>
</body>
</html>
